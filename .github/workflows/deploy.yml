name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  secrets-scan:
    name: Secrets - Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Slack Alert - Gitleaks Failed
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "❌ *Gitleaks failed* — secrets detected in code!\nCommit: `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
          SLACK_COLOR: danger
          SLACK_TITLE: "Secrets Scan Failed"

  dependency-scan:
    name: Dependency Scan - pip-audit
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        continue-on-error: true
        run: |
          pip-audit -r app/requirements.txt \
            --format=json \
            --output=pip-audit-report.json \
            --progress-spinner=off

      - name: Upload pip-audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

      - name: Slack Alert - pip-audit Failed
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "❌ *pip-audit failed* — vulnerable Python dependencies found!\nCommit: `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
          SLACK_COLOR: danger
          SLACK_TITLE: "Dependency Scan Failed"

  sast:
    name: SAST - SonarCloud Scan
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests with coverage
        run: |
          cd app
          python -m pytest test_app.py --cov=. --cov-report=xml:coverage.xml
        env:
          FLASK_SECRET: test-secret-key

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST Scan
        run: |
          bandit -r app/ \
            -f json \
            -o bandit-report.json \
            --exit-zero

      - name: Upload Bandit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.python.coverage.reportPaths=app/coverage.xml

      - name: Slack Alert - SAST Failed
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "❌ *SAST failed* — Bandit or SonarCloud Quality Gate failed!\nCommit: `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
          SLACK_COLOR: danger
          SLACK_TITLE: "SAST Scan Failed"

  dast:
    name: DAST - OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v6

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('app/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and run app
        run: |
          docker build -t devsecops-app ./app
          docker run -d -p 5000:5000 --name app devsecops-app
          sleep 5

      - name: OWASP ZAP Scan
        continue-on-error: true
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: "http://localhost:5000"
          fail_action: false
          cmd_options: '-I'

      - name: Stop app
        run: docker stop app && docker rm app

      - name: Slack Alert - DAST Failed
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "❌ *DAST failed* — OWASP ZAP found critical vulnerabilities!\nCommit: `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
          SLACK_COLOR: danger
          SLACK_TITLE: "DAST Scan Failed"

  build-and-push:
    name: Build, Push & Scan Image
    runs-on: ubuntu-latest
    needs: dast
    steps:
      - uses: actions/checkout@v6

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('app/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest ./app
          docker push ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Slack Alert - Trivy Failed
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "❌ *Trivy failed* — CRITICAL/HIGH CVEs found in Docker image!\nCommit: `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
          SLACK_COLOR: danger
          SLACK_TITLE: "Container Scan Failed"

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - name: Deploy to Staging EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest
            docker stop devsecops-app || true
            docker rm devsecops-app || true
            docker run -d -p 5001:5000 --name devsecops-app ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

      - name: Slack Alert - Staging Deployed
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "🟡 *Staging deployed successfully!*\nCommit: `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
          SLACK_COLOR: warning
          SLACK_TITLE: "Staging Deploy"

      - name: Slack Alert - Staging Failed
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "❌ *Staging deploy failed!*\nCommit: `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
          SLACK_COLOR: danger
          SLACK_TITLE: "Staging Deploy Failed"

  deploy-preprod:
    name: Deploy to Pre-prod
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: preprod
    steps:
      - name: Deploy to Pre-prod EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PREPROD_HOST }}
          username: ${{ secrets.PREPROD_USERNAME }}
          key: ${{ secrets.PREPROD_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest
            docker stop devsecops-app || true
            docker rm devsecops-app || true
            docker run -d -p 5000:5000 --name devsecops-app ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

      - name: Slack Alert - Pre-prod Deployed
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "🟠 *Pre-prod deployed successfully!* Awaiting manual approval for Production.\nCommit: `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
          SLACK_COLOR: warning
          SLACK_TITLE: "Pre-prod Deploy"

      - name: Slack Alert - Pre-prod Failed
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "❌ *Pre-prod deploy failed!*\nCommit: `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
          SLACK_COLOR: danger
          SLACK_TITLE: "Pre-prod Deploy Failed"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-preprod
    environment: production
    steps:
      - name: Deploy to Production EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest
            docker stop devsecops-app || true
            docker rm devsecops-app || true
            docker run -d -p 5000:5000 --name devsecops-app ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

      - name: Slack Alert - Production Failed
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "❌ *Production deploy failed!*\nCommit: `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
          SLACK_COLOR: danger
          SLACK_TITLE: "Production Deploy Failed"

      - name: Slack Success Alert
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "✅ *Full pipeline passed!* Gitleaks ✅ pip-audit ✅ Bandit ✅ SAST ✅ DAST ✅ Trivy ✅ SBOM ✅\n🟡 Staging ✅ 🟠 Pre-prod ✅ 🟢 Production ✅"
          SLACK_COLOR: good
          SLACK_TITLE: "Production Deployed"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [secrets-scan, dependency-scan, sast, dast, build-and-push, deploy-staging, deploy-preprod, deploy-production]
    if: failure()
    steps:
      - name: Slack Failure Alert
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "❌ DevSecOps Pipeline FAILED! Check GitHub Actions for details. Commit: ${{ github.sha }}"
          SLACK_COLOR: danger
          SLACK_TITLE: "Pipeline Failed"
