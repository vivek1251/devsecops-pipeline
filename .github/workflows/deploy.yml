name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  sast:
    name: SAST - SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  dast:
    name: DAST - OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v3

      - name: Build and run app
        run: |
          docker build -t devsecops-app ./app
          docker run -d -p 5000:5000 --name app devsecops-app
          sleep 5

      - name: Get app container IP
        run: echo "APP_URL=http://$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' app):5000" >> $GITHUB_ENV

      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: ${{ env.APP_URL }}
          fail_action: false

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: report_html.html
          retention-days: 30

      - name: Stop app
        run: docker stop app && docker rm app

  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: dast
    steps:
      - uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image for scanning
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest ./app

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM

      - name: Trivy scan — save report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest
          format: html
          output: trivy-report.html
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-vulnerability-report
          path: trivy-report.html
          retention-days: 30

  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: trivy
    steps:
      - uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest ./app
          docker push ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          use_insecure_cipher: true
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest
            docker stop devsecops-app || true
            docker rm devsecops-app || true
            docker run -d -p 5000:5000 --name devsecops-app ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

      - name: Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "✅ DevSecOps Pipeline passed! SAST + DAST + Trivy clean. App deployed to EC2."
          SLACK_COLOR: ${{ job.status }}